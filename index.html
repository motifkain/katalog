<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotifKain - Katalog Desain</title>
    <link rel="icon" id="faviconLink" href="assets/images/logo-motifkain.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div id="welcomeScreen" class="welcome-screen">
        <div class="welcome-left">
            <div class="welcome-left-content">
                <div class="welcome-logo-area" id="welcomeLogo">
                    <img id="welcomeLogoImg" src="" style="display:none;">
                    <span id="welcomeLogoPlaceholder">Upload Logo</span>
                </div>
                <p class="welcome-left-text" id="welcomeLeftText">
                    Deskripsi singkat tentang<br>koleksi atau perusahaan Anda.
                </p>
            </div>
        </div>
        <div class="welcome-right">
            <div class="welcome-header">
                <h1 class="welcome-title" id="welcomeTitle">CATALOG</h1>
                <p class="welcome-subtitle" id="welcomeSubtitle">Company Profile</p>
                <div class="welcome-divider"></div>
                <p class="welcome-description" id="welcomeDesc">
                    Koleksi produk eksklusif kami
                </p>
            </div>
            <button class="welcome-btn" onclick="openKatalog()">Lihat Katalog</button>
        </div>
    </div>

    <div id="appScreen" class="app-screen">
        <header class="app-header">
            <div class="header-top">
                <button class="back-btn-header" onclick="backToWelcome()" id="backToWelcomeBtn" style="display:none;">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                </button>
                <span class="header-title">MotifKain</span>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Cari produk..." oninput="filterProducts()">
                </div>
            </div>
            <nav class="category-tabs" id="categoryTabs">
                <button class="category-tab active" data-category="desain-motif">Desain Motif</button>
                <button class="category-tab" data-category="printing">Printing Kain</button>
                <button class="category-tab" data-category="pakaian">Pakaian Jadi</button>
                <button class="category-tab" data-category="asesoris">Asesoris</button>
            </nav>
        </header>

        <div class="back-btn-container" id="backBtnContainer" style="display:none;">
            <button class="back-btn" onclick="backToWelcome()">
                <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                Kembali ke Welcome
            </button>
        </div>

        <div class="subcategory-bar" id="subcategoryBar"></div>
        <main class="products-section">
            <div class="products-grid" id="productsGrid">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </main>
    </div>

    <!-- Product Detail Modal - Iswara App Style -->
    <div class="detail-modal" id="detailModal">
        <div class="detail-content">
            <!-- Handle -->
            <div class="detail-handle">
                <div class="detail-handle-bar"></div>
            </div>

            <!-- Close Button -->
            <button class="detail-close-btn" onclick="closeDetail()">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>

            <!-- Image Gallery -->
            <div class="detail-gallery" id="detailGallery">
                <div class="detail-image-container">
                    <img id="detailImage" src="" alt="" onclick="openImageZoom(this.src)">
                    <div class="gallery-badge" id="galleryBadge" style="display:none;"></div>
                </div>
                <div class="gallery-nav" id="galleryNav" style="display:none;">
                    <button class="gallery-btn prev" onclick="prevImage()">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
                    </button>
                    <div class="gallery-dots" id="galleryDots"></div>
                    <button class="gallery-btn next" onclick="nextImage()">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
                    </button>
                </div>
            </div>

            <div class="detail-info">
                <!-- Product Name -->
                <h2 class="detail-name" id="detailName"></h2>

                <!-- Price -->
                <p class="detail-price" id="detailPrice"></p>

                <!-- Category Badge -->
                <span class="detail-badge" id="detailBadge"></span>

                <!-- Store Card -->
                <div class="store-card" id="storeCard">
                    <div class="store-avatar" id="storeAvatar">M</div>
                    <div class="store-info">
                        <div class="store-name" id="storeName">MotifKain</div>
                        <div class="store-location" id="storeLocation">
                            <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                            <span></span>
                        </div>
                    </div>
                    <div class="store-wa-badge">
                        <svg viewBox="0 0 24 24" fill="#25D366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                    </div>
                </div>

                <!-- Description Section -->
                <div class="detail-section">
                    <h3 class="detail-section-title">Deskripsi</h3>
                    <p class="detail-description" id="detailDescription"></p>
                </div>
            </div>

            <!-- WA Button -->
            <div class="detail-footer">
                <button class="wa-button" onclick="toggleWaMenu()">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                    <span>Hubungi via WhatsApp</span>
                </button>
                <div class="wa-dropdown" id="waDropdown">
                    <div class="wa-dropdown-header">Pilih Kontak</div>
                    <div class="wa-dropdown-list" id="waDropdownList">
                        <!-- User options will be loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Zoom Modal -->
    <div class="zoom-modal" id="zoomModal" onclick="closeImageZoom(event)">
        <button class="zoom-close" onclick="closeImageZoom(event)">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
        <button class="zoom-nav zoom-prev" onclick="event.stopPropagation(); zoomPrevImage()">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
        </button>
        <div class="zoom-container" onclick="event.stopPropagation()">
            <img id="zoomImage" src="" alt="" class="zoom-image">
        </div>
        <button class="zoom-nav zoom-next" onclick="event.stopPropagation(); zoomNextImage()">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
        </button>
        <div class="zoom-counter" id="zoomCounter">1 / 1</div>
        <div class="zoom-hint">Geser untuk zoom • Geser untuk pan</div>
    </div>

    <script src="config.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
