<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Welcome Screen</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a2a3a;
        }
        .welcome-screen {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        .simple-welcome {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .simple-welcome-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
        }
        .simple-welcome-btn {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: #800020;
            color: #FFFDD0;
            border: none;
            border-radius: 8px;
            padding: 14px 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="welcome-screen">
        <div class="simple-welcome">
            <img src="assets/images/KATALOG.png" alt="Katalog" class="simple-welcome-image"
                 onerror="console.log('Image error:', this.src)">
            <button class="simple-welcome-btn" onclick="alert('Tombol works!')">Lihat Produk</button>
        </div>
    </div>
    <script>
        console.log('Test page loaded');
    </script>
</body>
</html>
