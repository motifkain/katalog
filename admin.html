<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - MotifKain</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* EARTH TONE THEME */
        :root {
            --primary: #8B5A2B;
            --primary-light: #A67C52;
            --accent: #CD853F;
            --background: #FAF0E6;
            --surface: #FFFFFF;
            --text-primary: #3E2723;
            --text-secondary: #8B7355;
            --divider: #D4C4B0;
            --success: #6B8E23;
            --danger: #C62828;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--background);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* LOGIN */
        .login-section {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }
        .login-card {
            background: var(--surface);
            padding: 40px; border-radius: 16px;
            width: 100%; max-width: 400px;
            box-shadow: 0 4px 20px rgba(139,90,43,0.1);
        }
        .login-card h1 {
            font-family: 'Playfair Display', serif;
            color: var(--primary); margin: 16px 0 8px;
        }
        .login-card p { color: var(--text-secondary); margin-bottom: 24px; }
        .login-logo { width: 80px; margin-bottom: 16px; }

        .form-input {
            width: 100%; padding: 14px 16px;
            border: 1px solid var(--divider);
            border-radius: 10px; font-size: 14px;
            margin-bottom: 12px; background: var(--surface);
        }
        .form-input:focus {
            outline: none; border-color: var(--primary);
        }

        .btn {
            padding: 12px 24px; border: none; border-radius: 10px;
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--primary); color: white;
        }
        .btn-primary:hover { background: #7A4E26; }
        .btn-outline {
            background: transparent; border: 1px solid var(--primary);
            color: var(--primary);
        }
        .btn-outline:hover { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #B71C1C; }
        .btn-sm { padding: 8px 16px; font-size: 13px; }
        .btn-block { width: 100%; }

        /* DASHBOARD */
        .dashboard-section { display: none; }
        .dashboard-section.active { display: block; }

        .dashboard-header {
            background: var(--primary); color: white;
            padding: 16px 24px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-logo { width: 40px; height: 40px; border-radius: 50%; }
        .header-left h1 { font-family: 'Playfair Display', serif; font-size: 20px; }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .header-right .btn-outline {
            border-color: white; color: white;
        }
        .header-right .btn-outline:hover {
            background: white; color: var(--primary);
        }

        /* MAIN CONTENT */
        .dashboard-content {
            padding: 24px; max-width: 1200px; margin: 0 auto;
        }

        /* SECTION CARDS */
        .section-card {
            background: var(--surface);
            border-radius: 16px; padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 10px rgba(139,90,43,0.08);
        }
        .section-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding-bottom: 16px;
            border-bottom: 1px solid var(--divider);
        }
        .section-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 18px; color: var(--primary);
        }

        /* PRODUCTS GRID */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }
        .product-card {
            background: var(--surface);
            border-radius: 12px; overflow: hidden;
            border: 1px solid var(--divider);
            cursor: pointer; transition: all 0.2s;
        }
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(139,90,43,0.15);
        }
        .product-img {
            width: 100%; aspect-ratio: 1;
            background: #F5F0EB;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-secondary); font-size: 12px;
            position: relative; overflow: hidden;
        }
        .product-img img { width: 100%; height: 100%; object-fit: cover; }
        .product-img-count {
            position: absolute; bottom: 4px; right: 4px;
            background: rgba(0,0,0,0.6); color: white;
            padding: 2px 8px; border-radius: 8px;
            font-size: 10px;
        }
        .product-info { padding: 12px; }
        .product-info h4 {
            font-size: 14px; margin-bottom: 4px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .product-info .price {
            color: var(--primary); font-weight: 600; font-size: 13px;
        }
        .product-info .category {
            font-size: 11px; color: var(--text-secondary);
        }

        /* MODAL */
        .modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: 9999;
            justify-content: center; align-items: center;
            padding: 20px;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: var(--surface);
            border-radius: 16px; width: 100%; max-width: 500px;
            max-height: 90vh; overflow-y: auto;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--divider);
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-header h3 {
            font-family: 'Playfair Display', serif;
            color: var(--primary);
        }
        .modal-close {
            background: none; border: none; font-size: 24px;
            cursor: pointer; color: var(--text-secondary);
        }
        .modal-close:hover { color: var(--text-primary); }
        .modal-body { padding: 24px; }
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--divider);
            display: flex; justify-content: flex-end; gap: 12px;
        }

        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block; font-size: 13px;
            font-weight: 500; margin-bottom: 6px;
            color: var(--text-secondary);
        }
        .form-group small {
            display: block; font-size: 11px;
            color: var(--text-secondary); margin-top: 4px;
        }

        /* IMAGE UPLOAD */
        .image-upload-area {
            border: 2px dashed var(--divider);
            border-radius: 12px; padding: 40px;
            text-align: center; cursor: pointer;
            transition: all 0.2s;
        }
        .image-upload-area:hover {
            border-color: var(--primary);
            background: rgba(139,90,43,0.05);
        }
        .image-upload-area .icon {
            font-size: 32px; margin-bottom: 8px;
        }
        .image-upload-area p { color: var(--text-secondary); font-size: 13px; }

        .uploaded-images {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px; margin-top: 16px;
        }
        .uploaded-img {
            position: relative; aspect-ratio: 1;
            border-radius: 8px; overflow: hidden;
            border: 1px solid var(--divider);
        }
        .uploaded-img img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .uploaded-img .delete-btn {
            position: absolute; top: 4px; right: 4px;
            background: var(--danger); color: white;
            border: none; width: 24px; height: 24px;
            border-radius: 50%; cursor: pointer;
            font-size: 14px; line-height: 24px;
        }
        .uploaded-img .edit-btn {
            position: absolute; bottom: 4px; right: 4px;
            background: var(--primary); color: white;
            border: none; width: 24px; height: 24px;
            border-radius: 50%; cursor: pointer;
            font-size: 12px;
        }

        /* NOTIFICATION */
        .notification {
            position: fixed; bottom: 24px; right: 24px;
            padding: 14px 24px; border-radius: 10px;
            color: white; font-weight: 500;
            z-index: 99999; animation: slideIn 0.3s ease;
        }
        .notification.success { background: var(--success); }
        .notification.error { background: var(--danger); }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center; padding: 40px;
            color: var(--text-secondary);
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <!-- LOGIN -->
    <div id="loginSection" class="login-section">
        <div class="login-card">
            <img src="assets/images/logo-motifkain.png" alt="MotifKain" class="login-logo">
            <h1>Dashboard Admin</h1>
            <p>Masuk dengan akun PocketBase</p>
            <form id="loginForm">
                <input type="email" id="emailInput" class="form-input" placeholder="Email" required>
                <input type="password" id="passwordInput" class="form-input" placeholder="Password" required>
                <button type="submit" class="btn btn-primary btn-block">Masuk</button>
            </form>
            <p id="loginError" class="login-error" style="color: var(--danger); margin-top: 12px; display: none;">Email atau password salah!</p>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboardSection" class="dashboard-section">
        <header class="dashboard-header">
            <div class="header-left">
                <img src="assets/images/logo-motifkain.png" alt="Logo" class="header-logo">
                <h1>Dashboard Admin</h1>
            </div>
            <div class="header-right">
                <button class="btn btn-outline btn-sm" onclick="admin.openCatalog()">Lihat Katalog</button>
                <button class="btn btn-outline btn-sm" onclick="admin.logout()">Logout</button>
            </div>
        </header>

        <div class="dashboard-content">
            <!-- PRODUK -->
            <div class="section-card">
                <div class="section-header">
                    <h2>Daftar Produk</h2>
                    <button class="btn btn-primary btn-sm" onclick="admin.showAddProductModal()">+ Tambah Produk</button>
                </div>
                <div class="products-grid" id="productsGrid">
                    <!-- Loaded from PocketBase -->
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL: ADD/EDIT PRODUCT -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="productModalTitle">Tambah Produk</h3>
                <button class="modal-close" onclick="admin.closeModal('productModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Nama Produk</label>
                    <input type="text" id="productName" class="form-input" placeholder="Contoh: Motif Parang Klasik">
                </div>
                <div class="form-group">
                    <label>Layanan</label>
                    <select id="productLayanan" class="form-input">
                        <option value="Jasa Desain">Jasa Desain</option>
                        <option value="Kain Printing">Kain Printing</option>
                        <option value="Pakaian Jadi">Pakaian Jadi</option>
                        <option value="Asesoris">Asesoris</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Kategori</label>
                    <input type="text" id="productKategori" class="form-input" placeholder="Contoh: Batik, Tenun, dll">
                </div>
                <div class="form-group">
                    <label>Harga</label>
                    <input type="number" id="productHarga" class="form-input" placeholder="Contoh: 150000">
                </div>
                <div class="form-group">
                    <label>Gambar Produk (bisa lebih dari 1)</label>
                    <div class="image-upload-area" onclick="document.getElementById('productImagesInput').click()">
                        <div class="icon">📷</div>
                        <p>Klik untuk upload gambar</p>
                    </div>
                    <input type="file" id="productImagesInput" accept="image/*" multiple style="display:none" onchange="admin.handleImageUpload(this)">
                    <div class="uploaded-images" id="uploadedImagesList"></div>
                </div>
                <div class="form-group">
                    <label>Deskripsi</label>
                    <textarea id="productDeskripsi" class="form-input" rows="3" placeholder="Deskripsi produk..."></textarea>
                </div>
                <div class="form-group">
                    <label>WhatsApp (untuk kontak)</label>
                    <input type="text" id="productWhatsapp" class="form-input" placeholder="Contoh: 6281234567890">
                    <small>Nomor WhatsApp tanpa tanda + atau spasi</small>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="admin.closeModal('productModal')">Batal</button>
                <button class="btn btn-danger" id="deleteProductBtn" onclick="admin.deleteProduct()" style="display:none;">Hapus</button>
                <button class="btn btn-primary" onclick="admin.saveProduct()">Simpan</button>
            </div>
        </div>
    </div>

    <!-- MODAL: EDIT IMAGE DETAIL -->
    <div id="imageDetailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Detail Gambar</h3>
                <button class="modal-close" onclick="admin.closeImageDetailModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Preview</label>
                    <img id="imageDetailPreview" style="width:100%;border-radius:8px;">
                </div>
                <div class="form-group">
                    <label>Warna</label>
                    <input type="text" id="imageWarna" class="form-input" placeholder="Contoh: Merah">
                </div>
                <div class="form-group">
                    <label>Deskripsi Gambar</label>
                    <textarea id="imageDeskripsi" class="form-input" rows="2" placeholder="Deskripsi untuk gambar ini..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-danger" onclick="admin.deleteImage()">Hapus Gambar</button>
                <button class="btn btn-primary" onclick="admin.saveImageDetail()">Simpan</button>
            </div>
        </div>
    </div>

    <!-- NOTIFICATION -->
    <div id="notification" class="notification"></div>

    <script src="config.js"></script>
    <script src="assets/js/admin.js"></script>
</body>
</html>
