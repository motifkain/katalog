<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - MotifKain</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        :root {
            --brown-dark: #5D4037;
            --brown-medium: #8D6E63;
            --brown-light: #A1887F;
            --teal: #008B8B;
            --teal-light: #20B2AA;
            --beige: #F5F0E8;
            --cream: #FFF8F0;
            --gold: #C9A66B;
            --white: #FFFFFF;
            --text: #3E2723;
            --text-light: #6D4C41;
            --error: #D32F2F;
            --success: #388E3C;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--beige); min-height: 100vh; overflow-x: hidden; }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--brown-light); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--brown-dark); }

        /* ===== LOGIN ===== */
        .login-section {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background: radial-gradient(ellipse at top, rgba(201,166,107,.15) 0%, transparent 50%), var(--beige);
        }

        .login-card {
            background: var(--white);
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(93,64,55,.15);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .login-card h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--brown-dark);
            margin-bottom: .5rem;
        }

        .login-card p {
            color: var(--text-light);
            font-size: .875rem;
            margin-bottom: 2rem;
        }

        .form-input {
            width: 100%;
            padding: .875rem 1rem;
            border: 2px solid rgba(93,64,55,.2);
            border-radius: 8px;
            font-size: 1rem;
            background: var(--cream);
            transition: all .3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--teal);
            background: var(--white);
        }

        .btn {
            padding: .875rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .3s;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary { background: var(--teal); color: var(--white); }
        .btn-primary:hover { background: var(--teal-light); transform: translateY(-2px); }

        .btn-secondary { background: rgba(255,255,255,.1); color: var(--white); border: 1px solid rgba(255,255,255,.2); }
        .btn-secondary:hover { background: rgba(255,255,255,.2); }

        .btn-outline { background: transparent; color: var(--brown-dark); border: 2px solid var(--brown-dark); }
        .btn-outline:hover { background: var(--brown-dark); color: var(--white); }

        .btn-sm { padding: .5rem 1rem; font-size: .875rem; }
        .btn-danger { background: var(--error); color: white; }
        .btn-danger:hover { background: #B71C1C; }

        .login-error { color: var(--error); font-size: .875rem; margin-top: 1rem; display: none; }

        /* ===== DASHBOARD ===== */
        .dashboard-section { display: none; }

        .dashboard-header {
            background: linear-gradient(135deg, var(--brown-dark) 0%, var(--brown-medium) 100%);
            color: var(--white);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .dashboard-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            color: var(--white);
        }

        .header-actions { display: flex; gap: .75rem; }

        /* ===== SETTINGS BAR ===== */
        .settings-bar {
            background: var(--cream);
            padding: .75rem 2rem;
            display: flex;
            gap: 1.5rem;
            font-size: .8rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .settings-bar label { display: flex; align-items: center; gap: .5rem; color: var(--text-light); }
        .settings-bar input[type="text"] {
            padding: .4rem .75rem;
            border: 1px solid rgba(93,64,55,.2);
            border-radius: 6px;
            font-size: .8rem;
            background: var(--white);
            width: 250px;
        }

        .sync-status {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ccc;
        }

        .sync-dot.connected { background: var(--success); }
        .sync-dot.local { background: var(--gold); }

        /* ===== MAIN LAYOUT ===== */
        .editor-layout {
            display: flex;
            min-height: calc(100vh - 120px);
        }

        /* ===== PAGES PANEL (LEFT) ===== */
        .pages-panel {
            background: var(--white);
            border-right: 1px solid rgba(93,64,55,.1);
            width: 300px;
            height: calc(100vh - 120px);
            position: sticky;
            top: 120px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 1rem;
            border-bottom: 1px solid rgba(93,64,55,.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .panel-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            color: var(--brown-dark);
        }

        .pages-list {
            flex: 1;
            overflow-y: auto;
            padding: .5rem;
        }

        /* Drag & Drop Items */
        .page-item {
            padding: .75rem;
            margin-bottom: .5rem;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all .2s;
            display: flex;
            align-items: center;
            gap: .75rem;
            background: var(--cream);
            position: relative;
        }

        .page-item:hover { border-color: var(--brown-light); background: rgba(93,64,55,.05); }
        .page-item.active { border-color: var(--teal); background: rgba(0,139,139,.08); }
        .page-item.dragging { opacity: 0.5; cursor: grabbing; }
        .page-item.drag-over { border-color: var(--teal); border-style: dashed; }

        .drag-handle {
            color: var(--brown-light);
            font-size: 1rem;
            cursor: grab;
            padding: .25rem;
            flex-shrink: 0;
        }

        .drag-handle:active {
            cursor: grabbing;
        }

        .page-thumb {
            width: 45px;
            height: 56px;
            border-radius: 4px;
            flex-shrink: 0;
            overflow: hidden;
            background: var(--beige);
        }

        .page-thumb img { width: 100%; height: 100%; object-fit: cover; }

        .page-info { flex: 1; min-width: 0; }
        .page-info h4 { font-size: .8rem; color: var(--brown-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .page-info span { font-size: .65rem; color: var(--text-light); }

        .page-badge {
            position: absolute;
            top: -.25rem;
            right: -.25rem;
            background: var(--teal);
            color: white;
            font-size: .5rem;
            padding: .15rem .4rem;
            border-radius: 10px;
            font-weight: 600;
        }

        .page-actions {
            display: flex;
            gap: .25rem;
            opacity: 0;
            transition: opacity .2s;
        }

        .page-item:hover .page-actions { opacity: 1; }
        .page-actions button {
            width: 24px;
            height: 24px;
            border: none;
            border-radius: 4px;
            background: transparent;
            cursor: pointer;
            font-size: .75rem;
            transition: all .2s;
        }
        .page-actions button:hover { background: rgba(0,0,0,.1); }
        .page-actions .delete-btn:hover { background: rgba(211,47,47,.1); color: var(--error); }

        /* ===== PREVIEW PANEL (CENTER) ===== */
        .preview-panel {
            background: var(--beige);
            flex: 1;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow-y: auto;
            min-width: 0;
        }

        .preview-book {
            width: 100%;
            max-width: 320px;
            aspect-ratio: 4 / 5;
            display: flex;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 12px 50px rgba(0,0,0,.2);
            flex-shrink: 0;
        }

        .preview-page { flex: 1; overflow: hidden; font-size: 7px; }
        .preview-page img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .preview-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-light);
            text-align: center;
        }

        .preview-placeholder span { font-size: 3rem; opacity: .2; margin-bottom: 1rem; }

        /* ===== EDITOR PANEL (RIGHT) ===== */
        .editor-panel {
            background: var(--white);
            border-left: 1px solid rgba(93,64,55,.1);
            width: 380px;
            min-width: 320px;
            height: calc(100vh - 120px);
            position: sticky;
            top: 120px;
            flex-shrink: 0;
            overflow-y: auto;
        }

        .editor-section { padding: 1rem; border-bottom: 1px solid rgba(93,64,55,.1); }
        .editor-section h3 { font-size: .875rem; color: var(--brown-dark); margin-bottom: 1rem; display: flex; align-items: center; gap: .5rem; }

        /* Template Grid */
        .template-grid { display: flex; flex-direction: column; gap: .5rem; }

        .template-category { margin-bottom: .75rem; }
        .template-category-label {
            font-size: .6rem;
            color: #999;
            letter-spacing: 0.1em;
            margin-bottom: .4rem;
            text-transform: uppercase;
        }

        .template-options-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: .4rem; }

        .template-option {
            padding: .5rem .25rem;
            border: 2px solid #E0D5C9;
            border-radius: 6px;
            cursor: pointer;
            transition: all .2s;
            text-align: center;
            background: var(--white);
            font-size: .65rem;
        }

        .template-option:hover { border-color: var(--teal); }
        .template-option.selected { border-color: var(--teal); background: rgba(0,139,139,.08); }

        .template-preview {
            height: 35px;
            border-radius: 4px;
            margin-bottom: .3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .7rem;
            font-weight: 600;
        }

        .template-option > span { font-size: .55rem; color: var(--text); display: block; }

        /* Form Fields */
        .field-group { margin-bottom: 1rem; }
        .field-group label { display: block; font-size: .75rem; color: var(--text-light); margin-bottom: .4rem; font-weight: 500; }
        .field-group input,
        .field-group textarea {
            width: 100%;
            padding: .75rem;
            border: 1px solid #E0D5C9;
            border-radius: 6px;
            font-size: .875rem;
            background: var(--cream);
            font-family: 'Inter', sans-serif;
            transition: all .2s;
        }
        .field-group input:focus,
        .field-group textarea:focus { outline: none; border-color: var(--teal); background: var(--white); }
        .field-group textarea { resize: vertical; min-height: 70px; }

        /* Image Upload */
        .image-upload {
            border: 2px dashed var(--brown-light);
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all .2s;
            background: var(--cream);
            min-height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .image-upload:hover { border-color: var(--teal); background: rgba(0,139,139,.05); }
        .image-upload.has-image { padding: .75rem; min-height: auto; }
        .image-upload img { max-width: 100%; max-height: 200px; border-radius: 4px; }
        .image-upload > span { display: block; font-size: .8rem; color: var(--text-light); margin-top: .5rem; }
        .image-upload input { display: none; }

        /* Grid Images - LEBIH BESAR */
        .grid-images { display: grid; grid-template-columns: repeat(2, 1fr); gap: .6rem; }
        .grid-image-item {
            aspect-ratio: 1;
            border: 2px dashed #D4C4B0;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--cream);
            transition: all .2s;
            min-height: 100px;
        }
        .grid-image-item:hover { border-color: var(--teal); }
        .grid-image-item img { width: 100%; height: 100%; object-fit: cover; }
        .grid-image-item > span { font-size: 1.5rem; opacity: .3; }

        /* Delete Button */
        .delete-section { padding: 1rem; }
        .delete-page-btn {
            width: 100%;
            padding: .75rem;
            background: var(--white);
            border: 1px solid var(--error);
            color: var(--error);
            border-radius: 6px;
            cursor: pointer;
            font-size: .875rem;
            transition: all .2s;
        }
        .delete-page-btn:hover { background: var(--error); color: white; }

        /* ===== NOTIFICATION ===== */
        .notification {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            background: var(--brown-dark);
            color: white;
            border-radius: 8px;
            font-size: .875rem;
            box-shadow: 0 4px 20px rgba(0,0,0,.2);
            transform: translateY(100px);
            opacity: 0;
            transition: all .3s;
            z-index: 1000;
        }
        .notification.show { transform: translateY(0); opacity: 1; }
        .notification.success { background: var(--success); }
        .notification.error { background: var(--error); }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1100px) {
            .editor-layout { flex-direction: column; }
            .pages-panel, .editor-panel {
                width: 100% !important;
                height: auto !important;
                position: static !important;
                max-height: 50vh;
            }
            .preview-panel { min-height: 60vh; }
        }

        @media (max-width: 768px) {
            .dashboard-header { flex-direction: column; text-align: center; }
            .settings-bar { flex-direction: column; align-items: stretch; }
            .settings-bar input[type="text"] { width: 100%; }
            .sync-status { margin-left: 0; margin-top: .5rem; }
        }
    </style>
</head>
<body>
    <!-- LOGIN -->
    <section id="loginSection" class="login-section">
        <div class="login-card">
            <img src="assets/logo/logo-motifkain.png" alt="MotifKain" style="max-width: 90px; margin-bottom: 2rem;">
            <h1>Dashboard Admin</h1>
            <p>Masukkan email & password PocketBase</p>
            <form id="loginForm">
                <input type="email" id="emailInput" class="form-input" placeholder="Email..." required style="margin-bottom: 0.75rem;">
                <input type="password" id="passwordInput" class="form-input" placeholder="Password..." required style="margin-bottom: 1rem;">
                <button type="submit" class="btn btn-primary" style="width: 100%;" id="loginBtn">Masuk</button>
            </form>
            <p id="loginError" class="login-error">Email atau password salah!</p>
            <p id="loginLoading" style="margin-top: 1rem; font-size: .75rem; color: var(--text-light); display: none;">Menghubungkan...</p>
        </div>
    </section>

    <!-- DASHBOARD -->
    <section id="dashboardSection" class="dashboard-section">
        <header class="dashboard-header">
            <h1>Dashboard MotifKain</h1>
            <div class="header-actions">
                <span id="userEmail" style="font-size: .8rem; opacity: 0.8;"></span>
                <button class="btn btn-secondary btn-sm" onclick="admin.openCatalog()">👁️ Lihat Katalog</button>
                <button class="btn btn-outline btn-sm" onclick="admin.refreshCatalog()">🔄 Refresh</button>
                <button class="btn btn-outline btn-sm" onclick="admin.logout()">Logout</button>
            </div>
        </header>

        <div class="editor-layout">
            <!-- PAGES LIST -->
            <div class="pages-panel">
                <div class="panel-header">
                    <h2>Halaman Katalog</h2>
                    <button class="btn btn-primary btn-sm" onclick="admin.addPage()">+ Tambah</button>
                </div>
                <div class="pages-list" id="pagesList"></div>
            </div>

            <!-- PREVIEW -->
            <div class="preview-panel">
                <div class="preview-book" id="previewBook">
                    <div class="preview-page" id="previewPage"></div>
                </div>
            </div>

            <!-- EDITOR -->
            <div class="editor-panel">
                <div class="editor-section">
                    <h3>Template <span id="currentTemplate"></span></h3>
                    <div class="template-grid" id="templateGrid"></div>
                </div>

                <div class="editor-section">
                    <h3>Isi Halaman</h3>
                    <div id="fieldsContainer"></div>
                </div>

                <div class="editor-section">
                    <h3>Gambar</h3>
                    <div id="imageFields"></div>
                </div>

                <div class="editor-section">
                    <h3>Logo</h3>
                    <div id="logoField"></div>
                </div>

                <!-- KLASIFIKASI PRODUK -->
                <div class="editor-section" style="background: rgba(0,139,139,0.05); border-radius: 8px; margin: 1rem;">
                    <h3 style="color: var(--teal);">Klasifikasi Produk</h3>
                    <div id="classificationFields">
                        <div class="field-group">
                            <label>Kategori</label>
                            <select id="categorySelect" onchange="admin.updateField('category', this.value)" style="width:100%;padding:.75rem;border:1px solid #E0D5C9;border-radius:6px;font-size:.875rem;background:var(--cream);">
                                <option value="">-- Pilih Kategori --</option>
                                <option value="desain-motif-kain">Desain Motif Kain</option>
                                <option value="printing-kain">Printing Kain</option>
                                <option value="pakaian-jadi">Pakaian Jadi</option>
                                <option value="asesoris">Asesoris</option>
                            </select>
                        </div>
                        <div class="field-group">
                            <label>Jenis</label>
                            <input type="text" id="jenisInput" placeholder="Contoh: Batik, Printing, Blouse..."
                                   onchange="admin.updateField('jenis', this.value)"
                                   style="width:100%;padding:.75rem;border:1px solid #E0D5C9;border-radius:6px;font-size:.875rem;background:var(--cream);">
                        </div>
                        <div class="field-group">
                            <label>Warna (pisahkan dengan koma)</label>
                            <input type="text" id="colorsInput" placeholder="#FF0000, #00FF00, #0000FF"
                                   onchange="admin.updateColors(this.value)"
                                   style="width:100%;padding:.75rem;border:1px solid #E0D5C9;border-radius:6px;font-size:.875rem;background:var(--cream);">
                            <div id="colorPreview" style="display:flex;gap:.5rem;margin-top:.5rem;flex-wrap:wrap;"></div>
                        </div>
                    </div>
                </div>

                <div class="delete-section">
                    <button class="delete-page-btn" onclick="admin.deleteCurrentPage()">Hapus Halaman</button>
                </div>
            </div>
        </div>
    </section>

    <!-- NOTIFICATION -->
    <div class="notification" id="notification"></div>

    <script src="config.js"></script>
    <script src="assets/js/templates.js"></script>
    <script>
        class AdminDashboard {
            constructor() {
                this.pages = [];
                this.currentPageIndex = -1;
                this.pocketbaseUrl = '';
                this.pocketbaseToken = '';
                this.pocketbaseModel = null;
                this.isConnected = false;
                this.draggedItem = null;
                this.init();
            }

            init() {
                // Check if already logged in with valid session
                const savedToken = sessionStorage.getItem('motifkain_pb_token');
                const savedUrl = sessionStorage.getItem('motifkain_pb_url');
                const savedEmail = sessionStorage.getItem('motifkain_user_email');

                if (savedToken && savedUrl) {
                    this.pocketbaseUrl = savedUrl;
                    this.pocketbaseToken = savedToken;
                    this.isConnected = true;
                    this.showDashboard();
                    if (savedEmail) {
                        document.getElementById('userEmail').textContent = savedEmail;
                    }
                    this.loadFromPocketBase();
                } else {
                    this.showLogin();
                }

                this.loadLocalPages();
                this.renderTemplateSelector();
                this.setupDragAndDrop();
            }

            showLogin() {
                document.getElementById('loginSection').style.display = 'flex';
                document.getElementById('dashboardSection').style.display = 'none';
            }

            showDashboard() {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('dashboardSection').style.display = 'block';
            }

            async login(email, password) {
                const btn = document.getElementById('loginBtn');
                const loading = document.getElementById('loginLoading');
                const error = document.getElementById('loginError');

                btn.disabled = true;
                btn.textContent = 'Loading...';
                loading.style.display = 'block';
                error.style.display = 'none';

                // Get URL from config
                const url = window.MOTIFKAIN_CONFIG?.pocketbaseUrl;
                if (!url) {
                    error.textContent = 'PocketBase URL belum diset di config.js';
                    error.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Masuk';
                    loading.style.display = 'none';
                    return;
                }

                this.pocketbaseUrl = url.replace(/\/$/, '');

                try {
                    // Authenticate with PocketBase admins API
                    const response = await fetch(`${this.pocketbaseUrl}/api/admins/auth-with-password`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            identity: email,
                            password: password
                        })
                    });

                    if (response.ok) {
                        const data = await response.json();

                        // Save session
                        this.pocketbaseToken = data.token;
                        this.pocketbaseModel = data.admin || data.user;
                        this.isConnected = true;

                        sessionStorage.setItem('motifkain_pb_token', data.token);
                        sessionStorage.setItem('motifkain_pb_url', this.pocketbaseUrl);
                        sessionStorage.setItem('motifkain_auth', 'authenticated');
                        sessionStorage.setItem('motifkain_user_email', email);

                        document.getElementById('userEmail').textContent = email;
                        this.showDashboard();

                        // Load pages from PocketBase
                        await this.loadFromPocketBase();
                    } else {
                        error.textContent = 'Email atau password salah!';
                        error.style.display = 'block';
                    }
                } catch (e) {
                    console.error('Login error:', e);
                    error.textContent = 'Tidak dapat terhubung ke server. Pastikan PocketBase aktif.';
                    error.style.display = 'block';
                }

                btn.disabled = false;
                btn.textContent = 'Masuk';
                loading.style.display = 'none';
            }

            logout() {
                sessionStorage.removeItem('motifkain_auth');
                sessionStorage.removeItem('motifkain_pb_token');
                sessionStorage.removeItem('motifkain_user_email');
                this.pocketbaseToken = '';
                this.pocketbaseModel = null;
                this.isConnected = false;
                this.showLogin();
            }

            // ===== LOCAL PAGES (fallback) =====
            loadLocalPages() {
                const stored = localStorage.getItem('motifkain_catalog');
                if (stored) {
                    try {
                        this.pages = JSON.parse(stored);
                    } catch (e) {
                        this.pages = [];
                    }
                }
                this.renderPagesList();
            }

            // ===== POCKETBASE SYNC =====
            async loadFromPocketBase() {
                if (!this.isConnected) return;

                try {
                    const response = await fetch(`${this.pocketbaseUrl}/api/collections/catalog_pages/records?sort=order&perPage=500`, {
                        headers: { 'Authorization': this.pocketbaseToken }
                    });

                    if (response.ok) {
                        const data = await response.json();
                        if (data.items && data.items.length > 0) {
                            this.pages = data.items.map(item => this.mapPocketBaseToPage(item));
                            this.renderPagesList();
                            this.selectPage(0);
                            this.showNotification(`Loaded ${this.pages.length} pages dari cloud`, 'success');
                        } else {
                            // No cloud data, try local
                            this.loadLocalPages();
                        }
                    }
                } catch (e) {
                    console.error('Load from PocketBase error:', e);
                    this.loadLocalPages();
                }
            }

            mapPocketBaseToPage(item) {
                return {
                    id: item.id,
                    template: item.template || 'cover-dark',
                    order: item.order || 0,
                    mainTitle: item.mainTitle || '',
                    subtitle: item.subtitle || '',
                    description: item.description || '',
                    title: item.title || '',
                    body: item.body || '',
                    overlayText: item.overlayText || '',
                    overlayPosition: item.overlayPosition || 'bottom',
                    header: item.header || '',
                    footerText: item.footerText || '',
                    image: item.image ? `${this.pocketbaseUrl}/api/files/catalog_pages/${item.id}/${item.image}` : '',
                    images: (item.images || []).map((img, idx) =>
                        `${this.pocketbaseUrl}/api/files/catalog_pages/${item.id}/${img}`),
                    logo: item.logo ? `${this.pocketbaseUrl}/api/files/catalog_pages/${item.id}/${item.logo}` : '',
                    colorTheme: item.colorTheme || '',
                    fontFamily: item.fontFamily || '',
                    fontSizePx: item.fontSizePx || 24,
                    titleSizePx: item.titleSizePx || 36,
                    bodySizePx: item.bodySizePx || 14,
                    logoSizePx: item.logoSizePx || 40,
                    textColor: item.textColor || '',
                    bgColor: item.bgColor || '',
                    // Classification fields
                    category: item.category || '',
                    jenis: item.jenis || '',
                    colors: item.colors || []
                };
            }

            saveToLocalStorage() {
                localStorage.setItem('motifkain_catalog', JSON.stringify(this.pages));
            }

            // ===== AUTO SYNC =====
            async addPage() {
                const newPage = {
                    ...PageTemplates.createEmptyPage('image-text'),
                    order: this.pages.length
                };

                if (this.isConnected) {
                    try {
                        const created = await this.createPageInPocketBase(newPage);
                        newPage.id = created.id;
                    } catch (e) {
                        console.error('Failed to create in PocketBase:', e);
                    }
                } else {
                    newPage.id = 'local_' + Date.now();
                }

                this.pages.push(newPage);
                this.saveToLocalStorage();
                this.renderPagesList();
                this.selectPage(this.pages.length - 1);
                this.showNotification('Halaman baru ditambahkan!', 'success');
            }

            async createPageInPocketBase(page) {
                const formData = new FormData();
                formData.append('template', page.template);
                formData.append('order', page.order);

                const response = await fetch(`${this.pocketbaseUrl}/api/collections/catalog_pages/records`, {
                    method: 'POST',
                    headers: { 'Authorization': this.pocketbaseToken },
                    body: formData
                });

                if (!response.ok) throw new Error('Create failed');
                return await response.json();
            }

            async updatePage(page) {
                this.saveToLocalStorage();

                if (this.isConnected && page.id && !String(page.id).startsWith('local_')) {
                    try {
                        await this.updatePageInPocketBase(page);
                    } catch (e) {
                        console.error('Failed to update in PocketBase:', e);
                    }
                }
            }

            async updatePageInPocketBase(page) {
                const formData = new FormData();
                formData.append('template', page.template);
                formData.append('order', page.order);
                formData.append('mainTitle', page.mainTitle || '');
                formData.append('subtitle', page.subtitle || '');
                formData.append('description', page.description || '');
                formData.append('title', page.title || '');
                formData.append('body', page.body || '');
                formData.append('overlayText', page.overlayText || '');
                formData.append('overlayPosition', page.overlayPosition || 'bottom');
                formData.append('header', page.header || '');
                formData.append('footerText', page.footerText || '');
                formData.append('colorTheme', page.colorTheme || '');
                formData.append('fontFamily', page.fontFamily || '');
                formData.append('fontSizePx', page.fontSizePx || 24);
                formData.append('titleSizePx', page.titleSizePx || 36);
                formData.append('bodySizePx', page.bodySizePx || 14);
                formData.append('logoSizePx', page.logoSizePx || 40);
                formData.append('textColor', page.textColor || '');
                formData.append('bgColor', page.bgColor || '');

                // Handle image uploads
                if (page.image && page.image.startsWith('data:')) {
                    const blob = this.dataURLtoBlob(page.image);
                    formData.append('image', blob, 'image.jpg');
                }

                if (page.logo && page.logo.startsWith('data:')) {
                    const blob = this.dataURLtoBlob(page.logo);
                    formData.append('logo', blob, 'logo.png');
                }

                if (page.images && page.images.length > 0) {
                    page.images.forEach((img, idx) => {
                        if (img && img.startsWith('data:')) {
                            const blob = this.dataURLtoBlob(img);
                            formData.append('images', blob, `image_${idx}.jpg`);
                        }
                    });
                }

                await fetch(`${this.pocketbaseUrl}/api/collections/catalog_pages/records/${page.id}`, {
                    method: 'PATCH',
                    headers: { 'Authorization': this.pocketbaseToken },
                    body: formData
                });
            }

            async deletePage(index) {
                const page = this.pages[index];
                if (!page) return;

                // Delete from PocketBase if connected
                if (this.isConnected && page.id && !String(page.id).startsWith('local_')) {
                    try {
                        await fetch(`${this.pocketbaseUrl}/api/collections/catalog_pages/records/${page.id}`, {
                            method: 'DELETE',
                            headers: { 'Authorization': this.pocketbaseToken }
                        });
                    } catch (e) {
                        console.error('Failed to delete from PocketBase:', e);
                    }
                }

                this.pages.splice(index, 1);

                // Update order
                this.pages.forEach((p, i) => p.order = i);

                this.saveToLocalStorage();

                if (this.currentPageIndex >= this.pages.length) {
                    this.currentPageIndex = Math.max(0, this.pages.length - 1);
                }

                this.renderPagesList();
                this.selectPage(this.currentPageIndex);
                this.showNotification('Halaman dihapus!', 'success');
            }

            async duplicatePage(index) {
                const original = this.pages[index];
                const duplicated = {
                    ...JSON.parse(JSON.stringify(original)),
                    id: 'local_' + Date.now(),
                    order: index + 1
                };

                // Insert after original
                this.pages.splice(index + 1, 0, duplicated);

                // Update orders
                this.pages.forEach((p, i) => p.order = i);

                // Create in PocketBase if connected
                if (this.isConnected) {
                    try {
                        const created = await this.createPageInPocketBase(duplicated);
                        duplicated.id = created.id;
                    } catch (e) {
                        console.error('Failed to create duplicate in PocketBase:', e);
                    }
                }

                this.saveToLocalStorage();
                this.renderPagesList();
                this.selectPage(index + 1);
                this.showNotification('Halaman diduplikasi!', 'success');
            }

            async reorderPages(fromIndex, toIndex) {
                const [movedPage] = this.pages.splice(fromIndex, 1);
                this.pages.splice(toIndex, 0, movedPage);

                // Update orders
                this.pages.forEach((p, i) => p.order = i);

                this.saveToLocalStorage();
                this.renderPagesList();

                // Update all pages in PocketBase
                if (this.isConnected) {
                    for (const page of this.pages) {
                        if (page.id && !String(page.id).startsWith('local_')) {
                            try {
                                await this.updatePageInPocketBase(page);
                            } catch (e) {
                                console.error('Failed to reorder:', e);
                            }
                        }
                    }
                }
            }

            dataURLtoBlob(dataurl) {
                const arr = dataurl.split(',');
                const mime = arr[0].match(/:(.*?);/)[1];
                const bstr = atob(arr[1]);
                let n = bstr.length;
                const u8arr = new Uint8Array(n);
                while (n--) { u8arr[n] = bstr.charCodeAt(n); }
                return new Blob([u8arr], { type: mime });
            }

            // ===== PAGES MANAGEMENT =====
            savePages() {
                localStorage.setItem('motifkain_catalog', JSON.stringify(this.pages));
                localStorage.setItem('motifkain_refresh', Date.now());
            }

            // ===== DRAG & DROP =====
            setupDragAndDrop() {
                const list = document.getElementById('pagesList');

                list.addEventListener('dragstart', (e) => {
                    const item = e.target.closest('.page-item');
                    if (!item) return;

                    this.draggedItem = item;
                    item.classList.add('dragging');

                    // Set order data
                    e.dataTransfer.setData('text/plain', item.dataset.index);
                    e.dataTransfer.effectAllowed = 'move';
                });

                list.addEventListener('dragend', (e) => {
                    const item = e.target.closest('.page-item');
                    if (item) item.classList.remove('dragging');

                    // Remove all drag-over states
                    list.querySelectorAll('.page-item').forEach(el => {
                        el.classList.remove('drag-over');
                    });

                    this.draggedItem = null;
                });

                list.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';

                    const item = e.target.closest('.page-item');
                    if (!item || item === this.draggedItem) return;

                    // Remove existing drag-over
                    list.querySelectorAll('.page-item').forEach(el => el.classList.remove('drag-over'));

                    // Add to current
                    item.classList.add('drag-over');
                });

                list.addEventListener('drop', (e) => {
                    e.preventDefault();

                    const targetItem = e.target.closest('.page-item');
                    if (!targetItem || !this.draggedItem) return;

                    const fromIndex = parseInt(this.draggedItem.dataset.index);
                    const toIndex = parseInt(targetItem.dataset.index);

                    if (fromIndex !== toIndex) {
                        this.reorderPages(fromIndex, toIndex);
                        this.showNotification(`Halaman dipindahkan ke posisi ${toIndex + 1}`, 'success');
                    }

                    targetItem.classList.remove('drag-over');
                });
            }

            // ===== RENDER =====
            renderPagesList() {
                const container = document.getElementById('pagesList');
                let html = '';

                this.pages.forEach((page, i) => {
                    const isActive = i === this.currentPageIndex;

                    // Get thumbnail color/icon
                    const template = PageTemplates.getTemplate(page.template);
                    const thumbColor = this.getThumbColor(page.template);

                    html += `
                    <div class="page-item ${isActive ? 'active' : ''}"
                         data-index="${i}"
                         draggable="true">
                        <div class="drag-handle">⋮⋮</div>
                        <div class="page-thumb" style="background:${thumbColor};">
                            ${page.image ? `<img src="${page.image}" alt="">` : ''}
                        </div>
                        <div class="page-info">
                            <h4>${this.getPageTitle(page) || `Halaman ${i + 1}`}</h4>
                            <span>${template.name}</span>
                        </div>
                        <span class="page-badge">${i + 1}</span>
                        <div class="page-actions">
                            <button onclick="event.stopPropagation(); admin.duplicatePage(${i})" title="Duplikat">D</button>
                            <button class="delete-btn" onclick="event.stopPropagation(); admin.deletePage(${i})" title="Hapus">X</button>
                        </div>
                    </div>`;
                });

                container.innerHTML = html;
            }

            getThumbColor(template) {
                const colors = {
                    'cover-dark': 'linear-gradient(180deg,#1a2a3a,#0d1520)',
                    'cover-light': '#FFF8F0',
                    'cover-split': 'linear-gradient(90deg,#1a1a1a 40%,#fff 60%)',
                    'cover-numbered': '#1a1a1a',
                    'cover-minimal': '#fafafa',
                    'cover-logo-left': 'linear-gradient(90deg,#1a1a1a 35%,#fff 65%)',
                    'image-full': '#1a1a1a',
                    'image-text': '#1a1a1a',
                    'text-image': '#FFF8F0',
                    'text-only': '#FFF8F0',
                    'image-split': 'linear-gradient(90deg,#1a1a1a 50%,#fff 50%)',
                    'text-grid': '#fff',
                    'text-left-image': '#fafafa',
                    'numbered-list': '#1a1a1a',
                    'image-dual': '#fff',
                    'gallery-2x2': '#fff',
                    'gallery-3x3': '#fff',
                    'gallery-masonry': '#fafafa'
                };
                return colors[template] || '#1a1a1a';
            }

            getPageTitle(page) {
                return page.mainTitle || page.title || page.header || page.overlayTitle || '';
            }

            selectPage(index) {
                this.currentPageIndex = index;
                this.renderPagesList();
                this.renderPreview();
                this.renderTemplateSelector();
                this.renderEditor();
            }

            renderPreview() {
                const preview = document.getElementById('previewPage');

                if (this.currentPageIndex < 0) {
                    preview.innerHTML = '<div class="preview-placeholder"><span>📄</span><p>Pilih halaman</p></div>';
                    return;
                }

                const page = this.pages[this.currentPageIndex];
                preview.innerHTML = PageTemplates.renderPage(page, this.currentPageIndex + 1);
            }

            renderTemplateSelector() {
                const container = document.getElementById('templateGrid');
                const templates = PageTemplates.getAllTemplates();
                const currentTemplate = this.currentPageIndex >= 0 ? this.pages[this.currentPageIndex].template : '';

                document.getElementById('currentTemplate').textContent = currentTemplate ?
                    '- ' + PageTemplates.getTemplate(currentTemplate).name : '';

                // Group templates by category
                const coverTemplates = templates.filter(t => t.id.startsWith('cover-'));
                const contentTemplates = templates.filter(t => t.id.startsWith('image-') || t.id.startsWith('text-'));
                const galleryTemplates = templates.filter(t => t.id.startsWith('gallery-') || t.id.includes('grid'));

                let html = '';

                // Cover Templates
                html += '<div class="template-category">';
                html += '<div class="template-category-label">COVER</div>';
                html += '<div class="template-options-row">';
                coverTemplates.forEach(t => {

                    const isDark = ['cover-dark', 'cover-numbered', 'cover-split'].includes(t.id);
                    html += `
                    <div class="template-option ${isSelected ? 'selected' : ''}" data-template="${t.id}">

                            ${t.icon}
                        </div>
                        <span>${t.name.replace('Cover ', '')}</span>
                    </div>`;
                });
                html += '</div></div>';

                // Content Templates
                html += '<div class="template-category">';
                html += '<div class="template-category-label">KONTEN</div>';
                html += '<div class="template-options-row">';
                contentTemplates.forEach(t => {
                    const isSelected = t.id === currentTemplate;
                    const isDark = t.id.includes('image-');
                    html += `
                    <div class="template-option ${isSelected ? 'selected' : ''}" data-template="${t.id}">
                        <div class="template-preview" style="background:${this.getThumbColor(t.id)};color:${isDark ? '#C9A66B' : '#5D4037'};">
                            ${t.icon}
                        </div>
                        <span>${t.name}</span>
                    </div>`;

                html += '</div></div>';

                // Gallery Templates
                html += '<div class="template-category">';
                html += '<div class="template-category-label">GALLERY</div>';
                html += '<div class="template-options-row">';
                galleryTemplates.forEach(t => {
                    const isSelected = t.id === currentTemplate;
                    html += `
                    <div class="template-option ${isSelected ? 'selected' : ''}" data-template="${t.id}">
                        <div class="template-preview" style="background:${this.getThumbColor(t.id)};color:#5D4037;">
                            ${t.icon}
                        </div>
                        <span>${t.name}</span>
                    </div>`;
                });
                html += '</div></div>';

                container.innerHTML = html;
            }

            changeTemplate(templateId) {
                if (this.currentPageIndex < 0) return;

                const newPage = PageTemplates.createEmptyPage(templateId);
                // Preserve essential data
                newPage.id = this.pages[this.currentPageIndex].id;
                newPage.createdAt = this.pages[this.currentPageIndex].createdAt;
                newPage.order = this.currentPageIndex;
                newPage.logo = this.pages[this.currentPageIndex].logo;
                newPage.image = this.pages[this.currentPageIndex].image;
                newPage.images = this.pages[this.currentPageIndex].images;

                this.pages[this.currentPageIndex] = newPage;
                this.savePages();
                this.saveToLocalStorage();

                this.renderTemplateSelector();
                this.renderPreview();
                this.renderEditor();
                this.renderPagesList();

                // Sync
                if (this.isConnected) {
                    this.updatePageInPocketBase(newPage);
                }
            }

            renderEditor() {
                if (this.currentPageIndex < 0) return;

                const page = this.pages[this.currentPageIndex];
                this.renderTextFields(page.template, page);

                        break;
                    case 'cover-numbered':
                        html += this.createInput('mainTitle', 'Judul Utama', page.mainTitle);
                        html += this.createInput('subtitle', 'Subtitle', page.subtitle);
                        html += this.createInput('header', 'Nomor (01, 02...)', page.header);
                        html += this.createTextarea('body', 'Deskripsi', page.body);
                        html += this.createSelect('logoPosition', 'Posisi Logo', page.logoPosition, ['top', 'bottom']);
                        break;
                    case 'cover-minimal':
                        html += this.createInput('mainTitle', 'Judul Utama', page.mainTitle);
                        html += this.createInput('subtitle', 'Subtitle', page.subtitle);
                        html += this.createTextarea('body', 'Tagline / Slogan', page.body);
                        html += this.createSelect('logoPosition', 'Posisi Logo', page.logoPosition, ['top', 'center', 'bottom']);
                        break;
                    case 'cover-logo-left':
                        html += this.createInput('mainTitle', 'Judul Utama', page.mainTitle);
                        html += this.createInput('subtitle', 'Subtitle', page.subtitle);
                        html += this.createInput('header', 'Header Kiri', page.header);
                        html += this.createTextarea('body', 'Deskripsi Kiri', page.body);
                        html += this.createTextarea('description', 'Deskripsi Kanan', page.description);
                        html += this.createSelect('logoPosition', 'Posisi Logo', page.logoPosition, ['left', 'top-center', 'center', 'bottom']);
                        break;
                    // Content Templates
                    case 'image-full':
                        html += this.createInput('overlayText', 'Teks Overlay', page.overlayText);
                        html += this.createSelect('overlayPosition', 'Posisi Teks', page.overlayPosition, ['bottom', 'top']);
                        break;
                    case 'image-text':
                    case 'text-image':
                    case 'text-left-image':
                        html += this.createInput('title', 'Judul', page.title);
                        html += this.createTextarea('body', 'Deskripsi', page.body);
                        html += this.createInput('footerText', 'Footer URL', page.footerText);
                        break;
                    case 'text-only':
                        html += this.createInput('subtitle', 'Subtitle', page.subtitle);
                        html += this.createInput('title', 'Judul', page.title);
                        html += this.createTextarea('body', 'Isi Teks', page.body);
                        break;
                    case 'image-split':
                        html += this.createInput('title', 'Judul Produk', page.title);
                        html += this.createTextarea('description', 'Deskripsi', page.description);
                        html += this.createInput('overlayText', 'Teks Overlay di Gambar', page.overlayText);
                        break;
                    case 'text-grid':
                        html += this.createInput('subtitle', 'Label Section', page.subtitle);
                        html += this.createInput('title', 'Judul', page.title);
                        html += this.createTextarea('body', 'Deskripsi', page.body);
                        html += this.createInput('footerText', 'Footer Info', page.footerText);
                        break;
                    case 'numbered-list':
                        html += this.createInput('mainTitle', 'Label Utama', page.mainTitle);
                        html += this.createInput('subtitle', 'Subtitle', page.subtitle);
                        html += this.createTextarea('body', 'Deskripsi Item 01', page.body);
                        html += this.createTextarea('overlayText', 'Deskripsi Item 02', page.overlayText);
                        html += this.createInput('overlayPosition', 'Deskripsi Item 03', page.overlayPosition);
                        html += this.createInput('footerText', 'Footer URL', page.footerText);
                        break;
                    case 'image-dual':
                        html += this.createInput('title', 'Judul', page.title);
                        html += this.createTextarea('description', 'Deskripsi', page.description);
                        html += this.createInput('footerText', 'Footer Info', page.footerText);
                        break;
                    // Gallery Templates
                    case 'gallery-2x2':
                    case 'gallery-3x3':
                    case 'gallery-masonry':
                        html += this.createInput('header', 'Header Gallery', page.header);
                        html += this.createInput('footerText', 'Footer Text', page.footerText);
                        break;
                }

                container.innerHTML = html;
            }

            createInput(field, label, value) {
                value = value || '';
                return `<div class="field-group">
                    <label>${label}</label>
                    <input type="text" value="${this.escapeHtml(value)}"
                           onchange="admin.updateField('${field}', this.value)">
                </div>`;
            }

            createTextarea(field, label, value) {
                value = value || '';
                return `<div class="field-group">
                    <label>${label}</label>
                    <textarea onchange="admin.updateField('${field}', this.value)">${this.escapeHtml(value)}</textarea>
                </div>`;
            }

            createSelect(field, label, value, options) {
                let opts = options.map(opt => `<option value="${opt}" ${opt === value ? 'selected' : ''}>${opt}</option>`).join('');
                return `<div class="field-group">
                    <label>${label}</label>
                    <select onchange="admin.updateField('${field}', this.value)" style="width:100%;padding:.75rem;border:1px solid #E0D5C9;border-radius:6px;font-size:.875rem;background:var(--cream);">
                        ${opts}
                    </select>
                </div>`;
            }

            escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            renderImageFields(template, page) {
                const container = document.getElementById('imageFields');
                let html = '';

                // Single image templates
                if (['cover-dark', 'cover-light', 'cover-split', 'cover-logo-left', 'cover-minimal', 'cover-numbered', 'image-full', 'image-text', 'text-image', 'text-only', 'image-split', 'text-left-image', 'numbered-list'].includes(template)) {
                    const hasImage = page.image ? 'has-image' : '';
                    const imageHtml = page.image ? `<img src="${page.image}" alt="">` :
                        `<span style="font-size:2rem;opacity:0.3;">📷</span><span>Klik upload</span>`;

                    html += `<div class="image-upload ${hasImage}" onclick="document.getElementById('imgInput').click()">
                        ${imageHtml}
                        <input type="file" id="imgInput" accept="image/*" onchange="admin.handleImageUpload(this.files[0], 'image')">
                    </div>`;

                    if (page.image) {
                        html += `<button class="btn btn-outline btn-sm" style="margin-top:0.5rem;width:100%;"
                                     onclick="admin.updateField('image', '')">Hapus Gambar</button>`;
                    }
                } else if (template === 'gallery-2x2') {
                    const images = page.images || ['','','',''];
                    html += '<div class="grid-images" style="gap:0.75rem;">';
                    images.forEach((img, i) => {
                        const imgHtml = img ? `<img src="${img}" alt="">` : `<span style="font-size:2rem;">+</span>`;
                        html += `<div class="grid-image-item" style="min-height:120px;" onclick="document.getElementById('g${i}').click()">
                            ${imgHtml}
                            <input type="file" id="g${i}" accept="image/*" style="display:none"
                                   onchange="admin.handleGridImageUpload(this.files[0], ${i})">
                        </div>`;
                    });
                    html += '</div>';
                } else if (template === 'gallery-3x3') {
                    const images = page.images || ['','','','','','','','',''];
                    html += '<div class="grid-images" style="grid-template-columns:repeat(3,1fr);">';
                    images.forEach((img, i) => {
                        const imgHtml = img ? `<img src="${img}" alt="">` : `<span>+</span>`;
                        html += `<div class="grid-image-item" style="min-height:120px;" onclick="document.getElementById('g${i}').click()">
                            ${imgHtml}
                            <input type="file" id="g${i}" accept="image/*" style="display:none"
                                   onchange="admin.handleGridImageUpload(this.files[0], ${i})">
                        </div>`;
                    });
                    html += '</div>';
                } else if (template === 'gallery-masonry') {
                    const images = page.images || ['','','','',''];
                    html += '<div class="grid-images" style="grid-template-columns:repeat(3,1fr);">';
                    images.forEach((img, i) => {
                        const imgHtml = img ? `<img src="${img}" alt="">` : `<span>+</span>`;
                        html += `<div class="grid-image-item" style="min-height:120px;" onclick="document.getElementById('g${i}').click()">
                            ${imgHtml}
                            <input type="file" id="g${i}" accept="image/*" style="display:none"
                                   onchange="admin.handleGridImageUpload(this.files[0], ${i})">
                        </div>`;
                    });
                    html += '</div>';
                } else if (template === 'text-grid') {
                    const images = page.images || ['','','',''];
                    html += '<div class="grid-images" style="grid-template-columns:repeat(2,1fr);gap:0.75rem;">';
                    images.forEach((img, i) => {
                        const imgHtml = img ? `<img src="${img}" alt="">` : `<span style="font-size:2rem;">+</span>`;
                        html += `<div class="grid-image-item" style="min-height:130px;" onclick="document.getElementById('g${i}').click()">
                            ${imgHtml}
                            <input type="file" id="g${i}" accept="image/*" style="display:none"
                                   onchange="admin.handleGridImageUpload(this.files[0], ${i})">
                        </div>`;
                    });
                    html += '</div>';
                } else if (template === 'image-dual') {
                    // First image
                    const hasImage1 = page.image ? 'has-image' : '';
                    const imageHtml1 = page.image ? `<img src="${page.image}" alt="">` :
                        `<span style="font-size:1.5rem;opacity:0.3;">📷</span><span>Gambar 1</span>`;
                    html += `<div style="margin-bottom:0.5rem;"><div class="image-upload ${hasImage1}" onclick="document.getElementById('imgInput').click()" style="min-height:80px;">
                        ${imageHtml1}
                        <input type="file" id="imgInput" accept="image/*" onchange="admin.handleImageUpload(this.files[0], 'image')">
                    </div></div>`;
                    // Second image
                    const images = page.images || ['',''];
                    const hasImage2 = images[0] ? 'has-image' : '';
                    const imageHtml2 = images[0] ? `<img src="${images[0]}" alt="">` :
                        `<span style="font-size:1.5rem;opacity:0.3;">📷</span><span>Gambar 2</span>`;
                    html += `<div class="image-upload ${hasImage2}" onclick="document.getElementById('imgDual').click()" style="min-height:80px;">
                        ${imageHtml2}
                        <input type="file" id="imgDual" accept="image/*" onchange="admin.handleGridImageUpload(this.files[0], 0)">
                    </div>`;
                }

                container.innerHTML = html;
            }

            renderLogoField(page) {
                const container = document.getElementById('logoField');
                const hasLogo = page.logo ? 'has-image' : '';
                const logoHtml = page.logo ? `<img src="${page.logo}" alt="Logo">` :
                    `<span style="font-size:1.5rem;opacity:0.3;">LOGO</span><span>Upload Logo</span>`;

                let html = `<div class="image-upload ${hasLogo}" onclick="document.getElementById('logoInput').click()">
                    ${logoHtml}
                    <input type="file" id="logoInput" accept="image/*" onchange="admin.handleImageUpload(this.files[0], 'logo')">
                </div>`;

                if (page.logo) {
                    html += `<button class="btn btn-outline btn-sm" style="margin-top:0.5rem;width:100%;"
                                 onclick="admin.updateField('logo', '')">Hapus Logo</button>`;
                }

                container.innerHTML = html;

                // Update classification fields
                const categorySelect = document.getElementById('categorySelect');
                const jenisInput = document.getElementById('jenisInput');
                const colorsInput = document.getElementById('colorsInput');
                const colorPreview = document.getElementById('colorPreview');

                if (categorySelect) categorySelect.value = page.category || '';
                if (jenisInput) jenisInput.value = page.jenis || '';
                if (colorsInput) {
                    const colors = page.colors || [];
                    colorsInput.value = colors.join(', ');
                    if (colorPreview) {
                        colorPreview.innerHTML = colors.map(c =>
                            `<div style="width:30px;height:30px;border-radius:50%;background:${c};border:2px solid #ddd;"></div>`
                        ).join('');
                    }
                }
            }

            updateColors(value) {
                const colors = value.split(',').map(c => c.trim()).filter(c => c);
                this.updateField('colors', colors);

                // Update preview
                const colorPreview = document.getElementById('colorPreview');
                if (colorPreview) {
                    colorPreview.innerHTML = colors.map(c =>
                        `<div style="width:30px;height:30px;border-radius:50%;background:${c};border:2px solid #ddd;"></div>`
                    ).join('');
                }
            }

            async updateField(field, value) {
                if (this.currentPageIndex < 0) return;

                this.pages[this.currentPageIndex][field] = value;
                this.savePages();
                this.renderPreview();
                this.renderPagesList();

                // Auto-sync to PocketBase
                await this.updatePage(this.pages[this.currentPageIndex]);
            }

            handleImageUpload(file, field) {
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    this.updateField(field, e.target.result);
                };
                reader.readAsDataURL(file);
            }

            handleGridImageUpload(file, index) {
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    if (this.currentPageIndex < 0) return;

                    const page = this.pages[this.currentPageIndex];
                    let images = page.images || [];

                    // Ensure array is large enough
                    const maxIndex = Math.max(
                        page.template === 'gallery-2x2' ? 4 : 0,
                        page.template === 'gallery-3x3' ? 9 : 0,
                        page.template === 'gallery-masonry' ? 5 : 0,
                        page.template === 'text-grid' ? 4 : 0
                    );

                    while (images.length <= maxIndex) {
                        images.push('');
                    }

                    images[index] = e.target.result;
                    this.updateField('images', images);
                };
                reader.readAsDataURL(file);
            }

            async addPage() {
                const newPage = {
                    ...PageTemplates.createEmptyPage('image-text'),
                    id: this.isConnected ? '' : 'local_' + Date.now(),
                    order: this.pages.length
                };

                if (this.isConnected) {
                    try {
                        const created = await this.createPageInPocketBase(newPage);
                        newPage.id = created.id;
                    } catch (e) {
                        console.error('Failed to create in PocketBase:', e);
                        newPage.id = 'local_' + Date.now();
                    }
                }

                this.pages.push(newPage);
                this.savePages();
                this.renderPagesList();
                this.selectPage(this.pages.length - 1);
                this.showNotification('Halaman baru ditambahkan!', 'success');
            }

            async duplicatePage(index) {
                const original = this.pages[index];
                const duplicated = {
                    ...JSON.parse(JSON.stringify(original)),
                    id: this.isConnected ? '' : 'local_' + Date.now()
                };

                this.pages.splice(index + 1, 0, duplicated);
                this.pages.forEach((p, i) => p.order = i);

                if (this.isConnected) {
                    try {
                        const created = await this.createPageInPocketBase(duplicated);
                        duplicated.id = created.id;
                    } catch (e) {
                        console.error('Failed to create in PocketBase:', e);
                        duplicated.id = 'local_' + Date.now();
                    }
                }

                this.savePages();
                this.renderPagesList();
                this.selectPage(index + 1);
                this.showNotification('Halaman diduplikasi!', 'success');
            }

            async deletePage(index) {
                if (this.pages.length <= 1) {
                    this.showNotification('Minimal harus ada 1 halaman!', 'error');
                    return;
                }

                const page = this.pages[index];

                // Delete from PocketBase if connected
                if (this.isConnected && page.id && !String(page.id).startsWith('local_')) {
                    try {
                        await fetch(`${this.pocketbaseUrl}/api/collections/catalog_pages/records/${page.id}`, {
                            method: 'DELETE',
                            headers: { 'Authorization': this.pocketbaseToken }
                        });
                    } catch (e) {
                        console.error('Failed to delete from PocketBase:', e);
                    }
                }

                this.pages.splice(index, 1);
                this.pages.forEach((p, i) => p.order = i);
                this.savePages();

                if (this.currentPageIndex >= this.pages.length) {
                    this.currentPageIndex = Math.max(0, this.pages.length - 1);
                }

                this.renderPagesList();
                this.selectPage(this.currentPageIndex);
                this.showNotification('Halaman dihapus!', 'success');
            }

            deleteCurrentPage() {
                if (this.currentPageIndex >= 0) {
                    this.deletePage(this.currentPageIndex);
                }
            }

            openCatalog() {
                // Open catalog in the same tab
                window.location.href = 'index.html';
            }

            refreshCatalog() {
                // Dispatch event to refresh the flipbook if it's open in another tab
                localStorage.setItem('motifkain_refresh', Date.now());
                this.showNotification('Katalog di-refresh!', 'success');
            }

            showNotification(message, type = '') {
                const notif = document.getElementById('notification');
                notif.textContent = message;
                notif.className = 'notification show' + (type ? ' ' + type : '');

                setTimeout(() => {
                    notif.classList.remove('show');
                }, 3000);
            }
        }

        let admin;
        document.addEventListener('DOMContentLoaded', function() {
            admin = new AdminDashboard();

            document.getElementById('loginForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const email = document.getElementById('emailInput').value.trim();
                const password = document.getElementById('passwordInput').value;
                admin.login(email, password);
            });

            // Template click delegation
            document.getElementById('templateGrid').addEventListener('click', function(e) {
                const option = e.target.closest('.template-option');
                if (option && admin) {
                    const templateId = option.dataset.template;
                    if (templateId) {
                        admin.changeTemplate(templateId);
                    }
                }
            });

            // Pages list click delegation
            document.getElementById('pagesList').addEventListener('click', function(e) {
                const item = e.target.closest('.page-item');
                if (item && admin) {
                    const index = parseInt(item.dataset.index);
                    if (!isNaN(index)) {
                        admin.selectPage(index);
                    }
                }
            });
        });
    </script>
</body>
</html>
