<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - MotifKain</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8B5A2B;
            --primary-light: #A67C52;
            --accent: #CD853F;
            --background: #FAF0E6;
            --surface: #FFFFFF;
            --text-primary: #3E2723;
            --text-secondary: #8B7355;
            --divider: #D4C4B0;
            --success: #6B8E23;
            --danger: #C62828;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--background);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .login-section {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }
        .login-card {
            background: var(--surface);
            padding: 40px; border-radius: 16px;
            width: 100%; max-width: 400px;
            box-shadow: 0 4px 20px rgba(139,90,43,0.1);
        }
        .login-card h1 {
            font-family: 'Playfair Display', serif;
            color: var(--primary); margin: 16px 0 8px;
        }
        .login-card p { color: var(--text-secondary); margin-bottom: 24px; }
        .login-logo { width: 80px; margin-bottom: 16px; }

        .form-input {
            width: 100%; padding: 14px 16px;
            border: 1px solid var(--divider);
            border-radius: 10px; font-size: 14px;
            margin-bottom: 12px; background: var(--surface);
        }
        .form-input:focus { outline: none; border-color: var(--primary); }

        .btn {
            padding: 10px 16px; border: none; border-radius: 8px;
            font-size: 13px; font-weight: 600; cursor: pointer;
            transition: all 0.2s; white-space: nowrap;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #7A4E26; }
        .btn-outline {
            background: transparent; border: 1px solid var(--primary);
            color: var(--primary);
        }
        .btn-outline:hover { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #B71C1C; }
        .btn-sm { padding: 8px 12px; font-size: 12px; }

        .dashboard-section { display: none; }
        .dashboard-section.active { display: block; }

        .dashboard-header {
            background: var(--primary); color: white;
            padding: 12px 16px;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 8px;
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-logo { height: 36px; width: auto; }
        .header-right {
            display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
        }
        .header-right .btn-outline {
            border-color: white; color: white; padding: 8px 12px;
        }
        .header-right .btn-outline:hover {
            background: white; color: var(--primary);
        }

        /* SEARCH BAR */
        .search-section {
            padding: 12px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--divider);
        }
        .search-bar {
            display: flex; gap: 8px; flex-wrap: wrap;
        }
        .search-input-wrap {
            flex: 1; min-width: 200px; position: relative;
        }
        .search-input-wrap input {
            width: 100%; padding: 10px 12px 10px 36px;
            border: 1px solid var(--divider); border-radius: 8px;
            font-size: 13px; background: var(--background);
        }
        .search-input-wrap input:focus {
            outline: none; border-color: var(--primary);
        }
        .search-input-wrap .search-icon {
            position: absolute; left: 10px; top: 50%;
            transform: translateY(-50%); color: var(--text-secondary);
        }
        .search-filter {
            padding: 10px 12px; border: 1px solid var(--divider);
            border-radius: 8px; font-size: 13px; background: var(--background);
            min-width: 120px;
        }

        /* MENU TABS */
        .menu-tabs {
            display: flex; gap: 6px; padding: 12px 16px;
            background: var(--surface); border-bottom: 1px solid var(--divider);
            overflow-x: auto; -webkit-overflow-scrolling: touch;
        }
        .menu-tabs::-webkit-scrollbar { display: none; }
        .menu-tab {
            padding: 10px 16px; border: none; border-radius: 20px;
            font-size: 13px; font-weight: 600; cursor: pointer;
            background: var(--background); color: var(--text-secondary);
            transition: all 0.2s; white-space: nowrap;
        }
        .menu-tab:hover { background: rgba(139,90,43,0.1); }
        .menu-tab.active {
            background: var(--primary); color: white;
        }

        .dashboard-content {
            padding: 16px; max-width: 1200px; margin: 0 auto;
        }

        .section-card {
            background: var(--surface);
            border-radius: 12px; padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 10px rgba(139,90,43,0.08);
        }
        .section-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px; padding-bottom: 12px;
            border-bottom: 1px solid var(--divider);
            flex-wrap: wrap; gap: 8px;
        }
        .section-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 16px; color: var(--primary);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }
        .product-card {
            background: var(--surface);
            border-radius: 10px; overflow: hidden;
            border: 1px solid var(--divider);
            cursor: pointer; transition: all 0.2s;
        }
        .product-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(139,90,43,0.12);
        }
        .product-img {
            width: 100%; aspect-ratio: 1;
            background: #F5F0EB;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-secondary); font-size: 12px;
            position: relative; overflow: hidden;
        }
        .product-img img { width: 100%; height: 100%; object-fit: cover; }
        .product-img-count {
            position: absolute; bottom: 4px; right: 4px;
            background: rgba(0,0,0,0.6); color: white;
            padding: 2px 6px; border-radius: 6px;
            font-size: 10px;
        }
        .product-info { padding: 10px; }
        .product-info h4 {
            font-size: 13px; margin-bottom: 4px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .product-info .price {
            color: var(--primary); font-weight: 600; font-size: 12px;
        }
        .product-info .category {
            font-size: 10px; color: var(--text-secondary);
        }

        .modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: 9999;
            justify-content: center; align-items: center;
            padding: 16px;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: var(--surface);
            border-radius: 16px; width: 100%; max-width: 480px;
            max-height: 90vh; overflow-y: auto;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--divider);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: var(--surface);
        }
        .modal-header h3 {
            font-family: 'Playfair Display', serif;
            color: var(--primary); font-size: 16px;
        }
        .modal-close {
            background: none; border: none; font-size: 20px;
            cursor: pointer; color: var(--text-secondary);
        }
        .modal-close:hover { color: var(--text-primary); }
        .modal-body { padding: 20px; }
        .modal-footer {
            padding: 12px 20px;
            border-top: 1px solid var(--divider);
            display: flex; justify-content: flex-end; gap: 8px;
            position: sticky; bottom: 0; background: var(--surface);
        }

        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block; font-size: 12px;
            font-weight: 500; margin-bottom: 6px;
            color: var(--text-secondary);
        }
        .form-group small {
            display: block; font-size: 11px;
            color: var(--text-secondary); margin-top: 4px;
        }
        .form-row {
            display: flex; gap: 12px;
        }
        .form-row .form-group { flex: 1; }

        .image-upload-area {
            border: 2px dashed var(--divider);
            border-radius: 10px; padding: 24px;
            text-align: center; cursor: pointer;
            transition: all 0.2s;
        }
        .image-upload-area:hover {
            border-color: var(--primary);
            background: rgba(139,90,43,0.05);
        }
        .image-upload-area .icon { font-size: 24px; margin-bottom: 6px; }
        .image-upload-area p { color: var(--text-secondary); font-size: 12px; }

        .uploaded-images {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 8px; margin-top: 12px;
        }
        .uploaded-img {
            position: relative; aspect-ratio: 1;
            border-radius: 8px; overflow: hidden;
            border: 1px solid var(--divider);
        }
        .uploaded-img img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .uploaded-img .delete-btn {
            position: absolute; top: 2px; right: 2px;
            background: var(--danger); color: white;
            border: none; width: 20px; height: 20px;
            border-radius: 50%; cursor: pointer;
            font-size: 12px; line-height: 20px;
        }
        .uploaded-img .edit-btn {
            position: absolute; bottom: 2px; right: 2px;
            background: var(--primary); color: white;
            border: none; width: 20px; height: 20px;
            border-radius: 50%; cursor: pointer;
            font-size: 10px;
        }

        .notification {
            position: fixed; bottom: 20px; right: 20px;
            padding: 12px 20px; border-radius: 8px;
            color: white; font-weight: 500;
            z-index: 99999; animation: slideIn 0.3s ease;
        }
        .notification.success { background: var(--success); }
        .notification.error { background: var(--danger); }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .empty-state {
            text-align: center; padding: 32px;
            color: var(--text-secondary);
        }
        .empty-state .icon { font-size: 40px; margin-bottom: 10px; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .result-count {
            font-size: 12px; color: var(--text-secondary);
            margin-bottom: 12px;
        }

        /* Mobile responsive */
        @media (max-width: 480px) {
            .header-left h1 { font-size: 14px; }
            .search-bar { flex-direction: column; }
            .search-input-wrap { min-width: 100%; }
            .search-filter { width: 100%; }
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .modal-content { margin: 8px; }
        }

        /* === WARNA / GAMBAR SECTION === */
        .form-section-title {
            font-size: 13px; font-weight: 600;
            color: var(--primary); margin-bottom: 12px;
            padding-bottom: 8px; border-bottom: 1px solid var(--divider);
        }
        .form-hint {
            font-size: 11px; color: var(--text-secondary);
            text-align: center; padding: 12px;
        }
        .warna-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 12px; }
        .warna-item {
            background: var(--background); border: 1px solid var(--divider);
            border-radius: 10px; padding: 12px;
        }
        .warna-item-header {
            display: flex; gap: 8px; align-items: center;
            margin-bottom: 10px;
        }
        .warna-name-input { font-size: 13px; padding: 10px 12px; }
        .gambar-list {
            display: flex; flex-wrap: wrap; gap: 6px;
            margin-bottom: 8px;
        }
        .gambar-thumb {
            position: relative; width: 64px; height: 64px;
            border-radius: 6px; overflow: hidden;
            border: 1px solid var(--divider); cursor: pointer;
        }
        .gambar-thumb img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .gambar-thumb .gambar-delete {
            position: absolute; top: 0; right: 0;
            background: var(--danger); color: white;
            width: 18px; height: 18px; border: none;
            border-radius: 0 0 0 6px; cursor: pointer;
            font-size: 12px; line-height: 18px; text-align: center;
        }
        .image-upload-area-sm {
            border: 1px dashed var(--divider); border-radius: 6px;
            padding: 8px; text-align: center; cursor: pointer;
            font-size: 12px; color: var(--text-secondary);
        }
        .image-upload-area-sm:hover { border-color: var(--primary); color: var(--primary); }
    </style>
</head>
<body>
    <!-- LOGIN -->
    <div id="loginSection" class="login-section">
        <div class="login-card">
            <img src="assets/images/logo-motifkain.svg" alt="MotifKain" class="login-logo">
            <h1>Dashboard Admin</h1>
            <p>Masuk dengan akun PocketBase</p>
            <form id="loginForm">
                <input type="email" id="emailInput" class="form-input" placeholder="Email" required>
                <input type="password" id="passwordInput" class="form-input" placeholder="Password" required>
                <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;">Masuk</button>
            </form>
            <p id="loginError" style="color:var(--danger);margin-top:12px;display:none;">Email atau password salah!</p>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboardSection" class="dashboard-section">
        <header class="dashboard-header">
            <div class="header-left">
                <img src="assets/images/logo-motifkain.svg" alt="Logo" class="header-logo">
            </div>
            <div class="header-right">
                <button class="btn btn-outline btn-sm" onclick="admin.openCatalog()">Lihat Katalog</button>
                <button class="btn btn-outline btn-sm" onclick="admin.logout()">Logout</button>
            </div>
        </header>

        <!-- SEARCH BAR -->
        <div class="search-section">
            <div class="search-bar">
                <div class="search-input-wrap">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="Cari produk atau portfolio..." oninput="admin.doSearch()">
                </div>
                <select class="search-filter" id="searchFilter" onchange="admin.doSearch()">
                    <option value="all">Semua</option>
                    <option value="produk">Produk</option>
                    <option value="portfolio">Portfolio</option>
                </select>
            </div>
        </div>

        <!-- MENU TABS -->
        <nav class="menu-tabs">
            <button class="menu-tab active" onclick="admin.switchTab('produk')">Produk</button>
            <button class="menu-tab" onclick="admin.switchTab('portfolio')">Portfolio</button>
        </nav>

        <div class="dashboard-content">
            <!-- PRODUK TAB -->
            <div id="tab-produk" class="tab-content active">
                <div class="section-card">
                    <div class="section-header">
                        <h2>Daftar Produk</h2>
                        <button class="btn btn-primary btn-sm" onclick="admin.showAddProductModal()">+ Tambah</button>
                    </div>
                    <div class="result-count" id="produkCount"></div>
                    <div class="products-grid" id="produkGrid"></div>
                </div>
            </div>

            <!-- PORTFOLIO TAB -->
            <div id="tab-portfolio" class="tab-content">
                <div class="section-card">
                    <div class="section-header">
                        <h2>Daftar Portfolio</h2>
                        <button class="btn btn-primary btn-sm" onclick="admin.showAddPortfolioModal()">+ Tambah</button>
                    </div>
                    <div class="result-count" id="portfolioCount"></div>
                    <div class="products-grid" id="portfolioGrid"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL: ADD/EDIT PRODUCT -->
    <div id="productModal" class="modal">
        <div class="modal-content" style="max-width: 560px;">
            <div class="modal-header">
                <h3 id="productModalTitle">Tambah Produk</h3>
                <button class="modal-close" onclick="admin.closeModal('productModal')">&times;</button>
            </div>
            <div class="modal-body">
                <!-- Info Produk -->
                <div class="form-section-title">Info Produk</div>
                <div class="form-group">
                    <label>Nama Produk *</label>
                    <input type="text" id="productName" class="form-input" placeholder="Contoh: Motif Parang Klasik">
                </div>
                <div class="form-row">
                    <div class="form-group" style="flex:1;">
                        <label>Kategori</label>
                        <input type="text" id="productKategori" class="form-input" placeholder="Contoh: Batik, Tenun">
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label>Sub Kategori</label>
                        <input type="text" id="productSubkategori" class="form-input" placeholder="Contoh: Motif Bunga">
                    </div>
                </div>
                <div class="form-group">
                    <label>Layanan</label>
                    <select id="productLayanan" class="form-input">
                        <option value="Jasa Desain">Jasa Desain</option>
                        <option value="Kain Printing">Kain Printing</option>
                        <option value="Pakaian Jadi">Pakaian Jadi</option>
                        <option value="Asesoris">Asesoris</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Harga</label>
                    <input type="number" id="productHarga" class="form-input" placeholder="Contoh: 150000">
                </div>
                <div class="form-group">
                    <label>Deskripsi</label>
                    <textarea id="productDeskripsi" class="form-input" rows="2" placeholder="Deskripsi produk..."></textarea>
                </div>

                <!-- Warna Section -->
                <div class="form-section-title" style="display:flex;justify-content:space-between;align-items:center;">
                    <span>Warna</span>
                    <button class="btn btn-outline btn-sm" onclick="admin.addWarnaItem()">+ Tambah Warna</button>
                </div>
                <div id="warnaList" class="warna-list"></div>
                <p id="warnaEmptyHint" class="form-hint">Belum ada warna. Klik "+ Tambah Warna" untuk menambahkan.</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="admin.closeModal('productModal')">Batal</button>
                <button class="btn btn-danger" id="deleteProductBtn" onclick="admin.deleteProduct()" style="display:none;">Hapus</button>
                <button class="btn btn-primary" onclick="admin.saveProduct()">Simpan</button>
            </div>
        </div>
    </div>

    <!-- TEMPLATE: Warna Item (hidden, cloned by JS) -->
    <template id="warnaItemTemplate">
        <div class="warna-item" data-warna-id="">
            <div class="warna-item-header">
                <input type="text" class="form-input warna-name-input" placeholder="Nama Warna (cth: Merah, Biru)" style="flex:1;margin-bottom:0;">
                <button class="btn btn-danger btn-sm" onclick="admin.removeWarnaItem(this)" title="Hapus Warna">&times;</button>
            </div>
            <div class="gambar-list"></div>
            <div class="image-upload-area-sm" onclick="admin.triggerImageUpload(this)">
                <span>+ Tambah Gambar</span>
            </div>
            <input type="file" class="warna-image-input" accept="image/*" multiple style="display:none" onchange="admin.handleWarnaImageUpload(this, this.closest('.warna-item'))">
        </div>
    </template>

    <!-- MODAL: Image Detail for Warna -->
    <div id="imageDetailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Detail Gambar</h3>
                <button class="modal-close" onclick="admin.closeImageDetailModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Preview</label>
                    <img id="imageDetailPreview" style="width:100%;border-radius:8px;">
                </div>
                <div class="form-group">
                    <label>Deskripsi Gambar</label>
                    <textarea id="imageDeskripsi" class="form-input" rows="2" placeholder="Deskripsi untuk gambar ini..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="admin.closeImageDetailModal()">Batal</button>
                <button class="btn btn-danger" onclick="admin.deleteCurrentImage()">Hapus</button>
                <button class="btn btn-primary" onclick="admin.saveImageDetail()">Simpan</button>
            </div>
        </div>
    </div>

    <!-- MODAL: ADD/EDIT PORTFOLIO -->
    <div id="portfolioModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="portfolioModalTitle">Tambah Portfolio</h3>
                <button class="modal-close" onclick="admin.closeModal('portfolioModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Judul Portfolio</label>
                    <input type="text" id="portfolioJudul" class="form-input" placeholder="Contoh: Koleksi Batik Nusantara">
                </div>
                <div class="form-group">
                    <label>Kategori</label>
                    <input type="text" id="portfolioKategori" class="form-input" placeholder="Contoh: Batik, Tenun">
                </div>
                <div class="form-group">
                    <label>Deskripsi</label>
                    <textarea id="portfolioDeskripsi" class="form-input" rows="2" placeholder="Deskripsi portfolio..."></textarea>
                </div>
                <div class="form-group">
                    <label>Gambar (bisa lebih dari 1)</label>
                    <div class="image-upload-area" onclick="document.getElementById('portfolioImagesInput').click()">
                        <div class="icon">📷</div>
                        <p>Klik untuk upload</p>
                    </div>
                    <input type="file" id="portfolioImagesInput" accept="image/*" multiple style="display:none" onchange="admin.handlePortfolioImageUpload(this)">
                    <div class="uploaded-images" id="portfolioImagesList"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="admin.closeModal('portfolioModal')">Batal</button>
                <button class="btn btn-danger" id="deletePortfolioBtn" onclick="admin.deletePortfolio()" style="display:none;">Hapus</button>
                <button class="btn btn-primary" onclick="admin.savePortfolio()">Simpan</button>
            </div>
        </div>
    </div>

    <!-- NOTIFICATION -->
    <div id="notification" class="notification"></div>

    <script src="config.js"></script>
    <script src="assets/js/admin.js"></script>
</body>
</html>
